syntax = "proto3";

package door_lock;

// 图像数据消息（客户端→服务器）
message ImageMessage {
    bytes image_data = 1;           // JPG格式的图像二进制数据
}

// 识别结果消息（服务器→客户端）
message ResultMessage {
    bool success = 1;               // 识别是否成功
    string personnel_id = 2;        // 人员ID（成功时）
    string name = 3;                // 姓名（成功时）
    string department = 4;          // 部门（成功时）
    string timestamp = 5;           // 识别时间
}
